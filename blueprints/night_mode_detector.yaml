blueprint:
  name: Night Mode Detector
  description: >
    Behavior-based day/night detection using built-in Home Assistant means.
    Instead of fixed times, a weighted score of presence and activity signals
    (bedroom/house motion, media players, lights, phone charging, a bedroom
    occupancy sensor) decides when the house switches to night mode. A Time of
    Day binary sensor defines the permitted night window; two pre-roll offsets
    let the sensors switch earlier than the hard edges. Optional Workday sensors
    add holiday awareness, and an optional presence gate prevents night mode from
    triggering when nobody is home.

    The automation toggles a central input_boolean that other automations
    (light/motion controllers, ...) can consume.
  domain: automation
  author: deroetzi
  homeassistant:
    min_version: 2024.6.0
  input:
    output:
      name: Output & time window
      icon: mdi:theme-light-dark
      collapsed: false
      input:
        night_mode_helper:
          name: Night Mode Helper
          description: >
            input_boolean that is turned on for night mode and off for day mode.
            Create it manually and let other automations read it.
          selector:
            entity:
              domain:
              - input_boolean
              multiple: false
              reorder: false
        sleep_tod:
          name: Sleep Window (Time of Day sensor)
          description: >
            Time of Day binary sensor that is 'on' during the permitted night
            hours. Its leading edge is the hard night fallback, its trailing edge
            the hard day fallback.
          selector:
            entity:
              domain:
              - binary_sensor
              multiple: false
              reorder: false
        bedtime_pre_roll:
          name: Bedtime Pre-Roll
          description: >
            How many minutes before the sleep window opens the sensors may
            already switch to night mode (if the score is high enough).
          default: 60
          selector:
            number:
              min: 0.0
              max: 240.0
              step: 5.0
              unit_of_measurement: min
              mode: box
        wake_pre_roll:
          name: Wake Pre-Roll
          description: >
            How many minutes before the sleep window closes a wake signal may
            already switch to day mode.
          default: 90
          selector:
            number:
              min: 0.0
              max: 240.0
              step: 5.0
              unit_of_measurement: min
              mode: box
    presence:
      name: Presence gate (optional)
      icon: mdi:home-account
      collapsed: true
      input:
        presence_entities:
          name: Presence Entities (optional)
          description: >
            person / device_tracker / presence binary_sensor (or a group of
            those). Soft night mode only switches on while at least one of them
            is 'home'/'on'. Leave empty to disable the gate (always treated as
            home). The hard sleep-window edges are NOT gated by presence.
          default: []
          selector:
            entity:
              multiple: true
              reorder: false
    holidays:
      name: Holiday handling (optional)
      icon: mdi:calendar-star
      collapsed: true
      input:
        sleep_tod_free:
          name: Sleep Window (free days)
          description: >
            Alternative Time of Day sensor used on non-working days. Leave empty
            to always use the main sleep window.
          default: []
          selector:
            entity:
              domain:
              - binary_sensor
              multiple: false
              reorder: false
        workday_today_sensor:
          name: Workday Sensor (today)
          description: >
            Workday binary_sensor with days_offset 0. Used for the wake edge (the
            morning is today). Leave empty to disable holiday handling.
          default: []
          selector:
            entity:
              domain:
              - binary_sensor
              multiple: false
              reorder: false
        workday_tomorrow_sensor:
          name: Workday Sensor (tomorrow)
          description: >
            Second Workday binary_sensor with days_offset 1. Used for the bedtime
            edge in the evening (you wake up tomorrow). Leave empty to disable
            holiday handling.
          default: []
          selector:
            entity:
              domain:
              - binary_sensor
              multiple: false
              reorder: false
    signals:
      name: Activity & presence signals
      icon: mdi:motion-sensor
      collapsed: false
      input:
        bedroom_motion:
          name: Bedroom Motion Sensors
          description: >
            Motion sensor(s) closest to the bedroom. Strongest behavioral signal
            for going to bed / waking up (own quiet weight + wake trigger).
          selector:
            entity:
              multiple: true
              device_class:
              - motion
              reorder: false
        house_motion:
          name: House Motion Sensors (optional)
          description: >
            Motion sensors in the rest of the house. Used to detect that nobody
            is active anymore.
          default: []
          selector:
            entity:
              multiple: true
              device_class:
              - motion
              reorder: false
        living_area_lights:
          name: Living Area Lights (optional)
          description: >
            Lights of the common/living areas. All off counts as 'nobody active'.
          default: []
          selector:
            entity:
              domain:
              - light
              - switch
              multiple: true
              reorder: false
        bedroom_lights:
          name: Bedroom Lights (optional)
          description: >
            Bedroom light(s). All off adds a small night signal; turning one on
            in the wake window counts as a wake signal.
          default: []
          selector:
            entity:
              domain:
              - light
              - switch
              multiple: true
              reorder: false
        awake_media_players:
          name: Awake Media Players (optional)
          description: >
            Media players whose active state means someone is awake (e.g. a TV).
            All off/idle counts towards night mode.
          default: []
          selector:
            entity:
              domain:
              - media_player
              multiple: true
              reorder: false
        presence_charging_sensors:
          name: Charging Sensors (optional)
          description: >
            binary_sensors that are 'on' while a phone is charging. When all are
            charging, everyone is likely in bed.
          default: []
          selector:
            entity:
              domain:
              - binary_sensor
              device_class:
              - battery_charging
              - plug
              multiple: true
              reorder: false
        bedroom_occupancy_sensor:
          name: Bedroom Occupancy Sensor (optional)
          description: >
            Numeric sensor that reads higher while the bedroom is occupied (e.g.
            PM2.5 or CO2). Above the threshold counts as occupied.
          default: []
          selector:
            entity:
              domain:
              - sensor
              multiple: false
              reorder: false
        bedroom_occupancy_threshold:
          name: Bedroom Occupancy Threshold
          description: Sensor value above which the bedroom is considered occupied.
          default: 8
          selector:
            number:
              min: 0.0
              max: 10000.0
              step: 0.5
              mode: box
    scoring:
      name: Scoring
      icon: mdi:counter
      collapsed: true
      input:
        night_score_threshold:
          name: Night Score Threshold
          description: >
            From this total score (within the night window) the house switches to
            night mode. Default 8 = the pure "idle house" signals alone (7) are
            just below it, so at least one real bedroom/bed signal is required.
          default: 8
          selector:
            number:
              min: 1.0
              max: 50.0
              step: 1.0
              mode: box
        quiet_minutes:
          name: Quiet Minutes
          description: >
            How long the motion sensors must report no motion to count as quiet.
          default: 20
          selector:
            number:
              min: 1.0
              max: 240.0
              step: 1.0
              unit_of_measurement: min
              mode: box
        weight_charging:
          name: Weight — all phones charging
          default: 3
          selector:
            number:
              min: 0.0
              max: 20.0
              step: 1.0
              mode: box
        weight_bedroom_occupancy:
          name: Weight — bedroom occupied
          default: 3
          selector:
            number:
              min: 0.0
              max: 20.0
              step: 1.0
              mode: box
        weight_bedroom_quiet:
          name: Weight — bedroom quiet (no bedroom motion)
          default: 3
          selector:
            number:
              min: 0.0
              max: 20.0
              step: 1.0
              mode: box
        weight_house_quiet:
          name: Weight — house quiet (no house motion)
          default: 2
          selector:
            number:
              min: 0.0
              max: 20.0
              step: 1.0
              mode: box
        weight_media_off:
          name: Weight — media players off
          default: 2
          selector:
            number:
              min: 0.0
              max: 20.0
              step: 1.0
              mode: box
        weight_lights_off:
          name: Weight — living area lights off
          default: 2
          selector:
            number:
              min: 0.0
              max: 20.0
              step: 1.0
              mode: box
        weight_bedroom_lights_off:
          name: Weight — bedroom lights off
          default: 1
          selector:
            number:
              min: 0.0
              max: 20.0
              step: 1.0
              mode: box
  source_url: https://raw.githubusercontent.com/DerOetzi/home-assistant-helper-collection/refs/heads/main/blueprints/night_mode_detector.yaml

mode: restart

variables:
  night_mode_helper: !input night_mode_helper
  sleep_tod: !input sleep_tod
  bedtime_pre_roll: !input bedtime_pre_roll
  wake_pre_roll: !input wake_pre_roll
  presence_entities: !input presence_entities
  bedroom_motion: !input bedroom_motion
  house_motion: !input house_motion
  living_area_lights: !input living_area_lights
  bedroom_lights: !input bedroom_lights
  awake_media_players: !input awake_media_players
  presence_charging_sensors: !input presence_charging_sensors
  bedroom_occupancy_threshold: !input bedroom_occupancy_threshold
  night_score_threshold: !input night_score_threshold
  quiet_minutes: !input quiet_minutes
  weight_charging: !input weight_charging
  weight_bedroom_occupancy: !input weight_bedroom_occupancy
  weight_bedroom_quiet: !input weight_bedroom_quiet
  weight_house_quiet: !input weight_house_quiet
  weight_media_off: !input weight_media_off
  weight_lights_off: !input weight_lights_off
  weight_bedroom_lights_off: !input weight_bedroom_lights_off

  # Raw optional single-entity inputs ([] when unset)
  sleep_tod_free_raw: !input sleep_tod_free
  workday_today_raw: !input workday_today_sensor
  workday_tomorrow_raw: !input workday_tomorrow_sensor
  bedroom_occupancy_raw: !input bedroom_occupancy_sensor

  # Normalize to a clean entity_id string or none (avoids [] / {} pitfalls)
  sleep_tod_free: "{{ sleep_tod_free_raw if sleep_tod_free_raw is string and sleep_tod_free_raw else none }}"
  workday_today_sensor: "{{ workday_today_raw if workday_today_raw is string and workday_today_raw else none }}"
  workday_tomorrow_sensor: "{{ workday_tomorrow_raw if workday_tomorrow_raw is string and workday_tomorrow_raw else none }}"
  bedroom_occupancy_sensor: "{{ bedroom_occupancy_raw if bedroom_occupancy_raw is string and bedroom_occupancy_raw else none }}"

  is_free_day: >-
    {% set wd = workday_tomorrow_sensor if now().hour >= 12 else workday_today_sensor %}
    {{ wd is not none and is_state(wd, 'off') }}

  active_tod: "{{ sleep_tod_free if (is_free_day and sleep_tod_free is not none) else sleep_tod }}"

  someone_home: >-
    {{ presence_entities | length == 0
       or expand(presence_entities) | selectattr('state', 'in', ['home', 'on']) | list | count > 0 }}

  approaching_bedtime: >-
    {% set ev = state_attr(active_tod, 'after') | as_timestamp(0) %}
    {{ is_state(active_tod, 'off') and ev > 0
       and (ev - now() | as_timestamp) <= bedtime_pre_roll | float(0) * 60 }}

  approaching_wake: >-
    {% set ev = state_attr(active_tod, 'before') | as_timestamp(0) %}
    {{ is_state(active_tod, 'on') and ev > 0
       and (ev - now() | as_timestamp) <= wake_pre_roll | float(0) * 60 }}

  in_night_window: "{{ is_state(active_tod, 'on') or approaching_bedtime }}"

  bed_score: >-
    {% set ns = namespace(score=0) %}
    {% if presence_charging_sensors | length > 0
       and expand(presence_charging_sensors) | selectattr('state', 'equalto', 'on') | list | count == presence_charging_sensors | length %}
      {% set ns.score = ns.score + weight_charging | int(0) %}
    {% endif %}
    {% if bedroom_occupancy_sensor is not none
       and states(bedroom_occupancy_sensor) | float(0) > bedroom_occupancy_threshold | float(0) %}
      {% set ns.score = ns.score + weight_bedroom_occupancy | int(0) %}
    {% endif %}
    {% if bedroom_motion | length > 0
       and expand(bedroom_motion) | selectattr('state', 'equalto', 'on') | list | count == 0
       and (now() - (expand(bedroom_motion) | map(attribute='last_changed') | max)).total_seconds() >= quiet_minutes | float(0) * 60 %}
      {% set ns.score = ns.score + weight_bedroom_quiet | int(0) %}
    {% endif %}
    {% if house_motion | length > 0
       and expand(house_motion) | selectattr('state', 'equalto', 'on') | list | count == 0
       and (now() - (expand(house_motion) | map(attribute='last_changed') | max)).total_seconds() >= quiet_minutes | float(0) * 60 %}
      {% set ns.score = ns.score + weight_house_quiet | int(0) %}
    {% endif %}
    {% if awake_media_players | length > 0
       and expand(awake_media_players) | selectattr('state', 'in', ['playing', 'on']) | list | count == 0 %}
      {% set ns.score = ns.score + weight_media_off | int(0) %}
    {% endif %}
    {% if living_area_lights | length > 0
       and expand(living_area_lights) | selectattr('state', 'equalto', 'on') | list | count == 0 %}
      {% set ns.score = ns.score + weight_lights_off | int(0) %}
    {% endif %}
    {% if bedroom_lights | length > 0
       and expand(bedroom_lights) | selectattr('state', 'equalto', 'on') | list | count == 0 %}
      {% set ns.score = ns.score + weight_bedroom_lights_off | int(0) %}
    {% endif %}
    {{ ns.score }}

trigger:
- id: tod_changed
  platform: state
  entity_id: !input sleep_tod
- id: tod_changed
  platform: state
  entity_id: !input sleep_tod_free
- id: bed_signal
  platform: state
  entity_id: !input presence_charging_sensors
- id: bed_signal
  platform: state
  entity_id: !input awake_media_players
- id: bed_signal
  platform: state
  entity_id: !input living_area_lights
- id: bed_signal
  platform: state
  entity_id: !input bedroom_lights
- id: bed_signal
  platform: state
  entity_id: !input bedroom_occupancy_sensor
- id: bed_signal
  platform: state
  entity_id: !input bedroom_motion
- id: bed_signal
  platform: state
  entity_id: !input house_motion
- id: quiet_reached
  platform: state
  entity_id: !input bedroom_motion
  to: 'off'
  for:
    minutes: !input quiet_minutes
- id: quiet_reached
  platform: state
  entity_id: !input house_motion
  to: 'off'
  for:
    minutes: !input quiet_minutes
- id: wake_signal
  platform: state
  entity_id: !input bedroom_motion
  to: 'on'
- id: wake_signal
  platform: state
  entity_id: !input house_motion
  to: 'on'
- id: wake_signal
  platform: state
  entity_id: !input presence_charging_sensors
  to: 'off'
- id: wake_signal
  platform: state
  entity_id: !input bedroom_lights
  to: 'on'
- id: wake_signal
  platform: numeric_state
  entity_id: !input bedroom_occupancy_sensor
  below: !input bedroom_occupancy_threshold
- id: tick
  platform: time_pattern
  minutes: /5

action:
- alias: Route based on trigger type
  choose:
  - alias: Hard night on — sleep window opened
    conditions:
    - condition: template
      value_template: >-
        {{ trigger.id == 'tod_changed' and trigger.entity_id == active_tod
           and is_state(active_tod, 'on') }}
    sequence:
    - alias: Turn on night mode
      service: input_boolean.turn_on
      target:
        entity_id: !input night_mode_helper
  - alias: Hard day off — sleep window closed
    conditions:
    - condition: template
      value_template: >-
        {{ trigger.id == 'tod_changed' and trigger.entity_id == active_tod
           and is_state(active_tod, 'off') }}
    sequence:
    - alias: Turn off night mode
      service: input_boolean.turn_off
      target:
        entity_id: !input night_mode_helper
  - alias: Soft night on — score reached within window and someone home
    conditions:
    - condition: template
      value_template: "{{ trigger.id in ['bed_signal', 'quiet_reached', 'tick'] }}"
    - condition: template
      value_template: "{{ is_state(night_mode_helper, 'off') }}"
    - condition: template
      value_template: "{{ in_night_window }}"
    - condition: template
      value_template: "{{ someone_home }}"
    - condition: template
      value_template: "{{ bed_score | int(0) >= night_score_threshold | int(0) }}"
    sequence:
    - alias: Turn on night mode
      service: input_boolean.turn_on
      target:
        entity_id: !input night_mode_helper
  - alias: Soft day off — wake signal within wake window
    conditions:
    - condition: template
      value_template: "{{ trigger.id == 'wake_signal' }}"
    - condition: template
      value_template: "{{ is_state(night_mode_helper, 'on') }}"
    - condition: template
      value_template: "{{ approaching_wake }}"
    sequence:
    - alias: Turn off night mode
      service: input_boolean.turn_off
      target:
        entity_id: !input night_mode_helper