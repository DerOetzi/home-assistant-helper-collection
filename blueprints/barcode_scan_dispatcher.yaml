blueprint:
  name: Barcode Scan Dispatcher
  description: >
    Forwards every barcode scan published on an MQTT topic to the
    Meals & Groceries integration's `meals_and_groceries.scan_barcode`
    service. Triggers on the raw MQTT message rather than a derived
    sensor's state, so scanning the same barcode repeatedly in a row
    still fires every time (a `state` trigger would not re-fire on an
    unchanged value).

    Multiple scanners in different locations are simply multiple instances
    of this blueprint, each pointing at its own MQTT topic — the
    Meals & Groceries integration itself has no concept of scanner hardware.
  domain: automation
  author: deroetzi
  homeassistant:
    min_version: 2024.6.0
  input:
    mqtt_topic:
      name: Barcode Scanner MQTT Topic
      description: >
        MQTT topic the scanner publishes each scanned barcode to
        (e.g. scanner/kueche/barcode). The raw payload is used as-is
        as the barcode.
      selector:
        text:

trigger:
  - platform: mqtt
    topic: !input mqtt_topic

condition:
  - alias: Scanned value is a real barcode
    condition: template
    value_template: "{{ trigger.payload not in ['', None] }}"

action:
  - alias: Forward barcode to Meals & Groceries
    action: meals_and_groceries.scan_barcode
    data:
      barcode: "{{ trigger.payload }}"

mode: queued
max_exceeded: silent
