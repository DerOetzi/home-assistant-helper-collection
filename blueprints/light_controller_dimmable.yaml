blueprint:
  name: Light Controller – Dimmable & Color Temperature
  description: >
    Controls dimmable lights based on an input_select or select entity state.
    Supports brightness control, color temperature adjustment, transition times, and nightmode.
    Expects controller states: "On", "Off", and optionally "Night" or "Nightmode".
  domain: automation
  author: deroetzi
  homeassistant:
    min_version: "2024.6.0"

  input:
    controller_entity:
      name: Controller Entity
      description: >
        input_select or select entity that controls the lights.
        Expected states: "On", "Off", and optionally "Night" or "Nightmode".
        State names are case-insensitive.
      selector:
        entity:
          domain:
            - input_select
            - select

    light_entities:
      name: Light Entities
      description: One or more dimmable light entities to control
      selector:
        entity:
          multiple: true
          domain: light

    on_brightness:
      name: On Brightness
      description: Brightness percentage when turning light on (1-100)
      default: 100
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
          mode: slider

    nightmode_brightness:
      name: Nightmode Brightness
      description: Brightness percentage in nightmode (1-100)
      default: 10
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
          mode: slider

    default_color_temperature:
      name: Default Color Temperature (optional)
      description: >
        Color temperature in Kelvin (2200-6500).
        Leave empty if your lights don't support color temperature.
      default: 2700
      selector:
        number:
          min: 2200
          max: 6500
          step: 50
          unit_of_measurement: K
          mode: box

    nightmode_color_temperature:
      name: Nightmode Color Temperature (optional)
      description: >
        Color temperature in Kelvin for nightmode (2200-6500).
        Leave empty to use the same as default.
      default: 2200
      selector:
        number:
          min: 2200
          max: 6500
          step: 50
          unit_of_measurement: K
          mode: box

    transition_time:
      name: Transition Time
      description: Fade time when changing brightness or color (in seconds)
      default: 0.3
      selector:
        number:
          min: 0
          max: 10
          step: 0.1
          unit_of_measurement: s
          mode: box

mode: restart
max_exceeded: silent

variables:
  controller_entity: !input controller_entity
  light_entities: !input light_entities
  default_color_temperature: !input default_color_temperature
  nightmode_color_temperature: !input nightmode_color_temperature

trigger:
  - platform: state
    entity_id: !input controller_entity

action:
  - alias: Handle controller state
    choose:
      # ON State
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.to_state.state | lower in ['on'] }}
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input light_entities
            data:
              brightness_pct: !input on_brightness
              color_temp_kelvin: !input default_color_temperature
              transition: !input transition_time

      # NIGHT/NIGHTMODE State
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.to_state.state | lower in ['night', 'nightmode'] }}
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input light_entities
            data:
              brightness_pct: !input nightmode_brightness
              color_temp_kelvin: !input nightmode_color_temperature
              transition: !input transition_time

      # OFF State
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.to_state.state | lower in ['off'] }}
        sequence:
          - action: light.turn_off
            target:
              entity_id: !input light_entities
            data:
              transition: !input transition_time

    default:
      - alias: Log unknown controller state
        action: system_log.write
        data:
          message: >
            Light Controller: Unknown state '{{ trigger.to_state.state }}'
            from controller '{{ controller_entity }}'.
            Expected states: On, Off, Night/Nightmode.
          level: warning
