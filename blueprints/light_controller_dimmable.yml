lueprint:
  name: Light Controller – Dimmable & Color Temperature
  description: >
    Controls dimmable lights with optional color temperature adjustment.
    Supports brightness control, transition times, and nightmode.
    For use with dimmable and color temperature light types.
  domain: automation
  author: deroetzi
  homeassistant:
    min_version: "2024.6.0"

  input:
    light_entities:
      name: Light Entities
      description: One or more dimmable light entities to control
      selector:
        entity:
          multiple: true
          domain: light

    on_brightness:
      name: On Brightness
      description: Brightness percentage when turning light on (0-100)
      default: 100
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
          mode: slider

    transition_time:
      name: Transition Time
      description: Fade time when changing brightness or color (in seconds)
      default: 0.3
      selector:
        number:
          min: 0
          max: 10
          step: 0.1
          unit_of_measurement: s
          mode: box

    nightmode_brightness:
      name: Nightmode Brightness
      description: Brightness percentage in nightmode (0-100)
      default: 10
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
          mode: slider

    default_color_temperature:
      name: Default Color Temperature
      description: Default color temperature in Kelvin (2200-6500)
      default: 2700
      selector:
        number:
          min: 2200
          max: 6500
          step: 50
          unit_of_measurement: K
          mode: box

    command_on:
      name: On Command
      description: The command that triggers "on". Usually "On" or "true"
      default: "On"
      selector:
        text:

    command_off:
      name: Off Command
      description: The command that triggers "off". Usually "Off" or "false"
      default: "Off"
      selector:
        text:

    command_nightmode:
      name: Nightmode Command
      description: The command that triggers nightmode. Usually "Nightmode"
      default: "Nightmode"
      selector:
        text:

mode: queued
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input light_entities

action:
  - alias: Handle light command
    choose:
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.payload == !input command_on }}
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entities
            data:
              brightness_pct: !input on_brightness
              color_temp_kelvin: !input default_color_temperature
              transition: !input transition_time

      - conditions:
          - condition: template
            value_template: >
              {{ trigger.payload == !input command_nightmode }}
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entities
            data:
              brightness_pct: !input nightmode_brightness
              color_temp_kelvin: !input default_color_temperature
              transition: !input transition_time

      - conditions:
          - condition: template
            value_template: >
              {{ trigger.payload == !input command_off }}
        sequence:
          - service: light.turn_off
            target:
              entity_id: !input light_entities
            data:
              transition: !input transition_time