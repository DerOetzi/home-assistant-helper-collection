blueprint:
  name: Manual Override Block
  description: >
    Generic manual-override guard: detects a person-initiated change (via
    context.user_id, not a change made by an automation/script) to any
    entity and blocks a companion input_boolean for a configurable
    duration. A new manual change during the block period resets the timer
    (mode: restart).

    Pair this with any automation that reads the blocked_boolean and skips
    its own writes while it is "on" — e.g. a light/select controller that
    should back off after a human overrides it, or a PV-surplus controller
    that should not immediately overwrite a manually chosen operation mode.

    Originally written for the Motion Controller blueprint, but the
    mechanism is entity- and domain-agnostic (target_entity accepts any
    entity, not just lights/selects).
  domain: automation
  author: deroetzi
  homeassistant:
    min_version: "2024.8.0"

  input:
    target_entity:
      name: Target Entity
      description: >
        The entity whose manual changes should trigger the block (e.g.
        light.living_room, input_select.some_mode, select.some_option).
      selector:
        entity:

    blocked_boolean:
      name: Blocked Switch
      description: >
        input_boolean read by the paired automation. Turned on when a
        manual override is detected and automatically turned off again
        after the block duration.
      selector:
        entity:
          domain: input_boolean

    reactivate_minutes:
      name: Auto-release after (minutes)
      default: 30
      selector:
        number:
          min: 1
          max: 240
          unit_of_measurement: min
          mode: box

  source_url: https://raw.githubusercontent.com/DerOetzi/home-assistant-helper-collection/refs/heads/main/blueprints/manual_override_block.yaml

mode: restart
max_exceeded: silent

trigger:
  - id: manual_override
    platform: state
    entity_id: !input target_entity
    not_to:
      - unavailable
      - unknown

  - id: manual_unblock
    platform: state
    entity_id: !input blocked_boolean
    to: "off"

condition:
  - alias: Only on manual change (not triggered by an automation)
    condition: template
    value_template: >
      {{ trigger.to_state.context.user_id is not none }}

  - alias: Only proceed if manual override (not manual unblock)
    condition: template
    value_template: >
      {{ trigger.id == 'manual_override' }}

action:
  - alias: Block automation
    action: input_boolean.turn_on
    target:
      entity_id: !input blocked_boolean

  - alias: Auto-release timer
    delay:
      minutes: !input reactivate_minutes

  - alias: Release block
    action: input_boolean.turn_off
    target:
      entity_id: !input blocked_boolean
