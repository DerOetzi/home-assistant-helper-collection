blueprint:
  name: Zigbee2MQTT Event Mapper
  description: >
    Generic mapper for Zigbee2MQTT device events using Home Assistant event entities.
    Supports one or multiple event entities (e.g., multiple switches in the same room).
    Configure which actions should be executed for each button event (on, off,
    arrow clicks, brightness changes, etc.). Reusable for any Zigbee device with an event entity.
  domain: automation
  author: deroetzi
  homeassistant:
    min_version: "2024.6.0"

  input:
    event_entity:
      name: Zigbee2MQTT Event Entity (or Entities)
      description: >
        One or more event entities (e.g., event.device_name_action).
        All selected entities will trigger the same actions.
        You can find them in Settings > Devices & Services > Your Zigbee Device.
      selector:
        entity:
          domain: event
          multiple: true

    event_on:
      name: Event "on" Actions
      description: Actions to execute when device sends "on" event
      default: []
      selector:
        action:

    event_off:
      name: Event "off" Actions
      description: Actions to execute when device sends "off" event
      default: []
      selector:
        action:

    event_toggle:
      name: Event "toggle" Actions
      description: Actions to execute when device sends "toggle" event
      default: []
      selector:
        action:

    event_arrow_left_click:
      name: Event "arrow_left_click" Actions
      description: Actions to execute when device sends "arrow_left_click" event
      default: []
      selector:
        action:

    event_arrow_right_click:
      name: Event "arrow_right_click" Actions
      description: Actions to execute when device sends "arrow_right_click" event
      default: []
      selector:
        action:

    event_arrow_left_hold:
      name: Event "arrow_left_hold" Actions
      description: Actions to execute when device sends "arrow_left_hold" event
      default: []
      selector:
        action:

    event_arrow_right_hold:
      name: Event "arrow_right_hold" Actions
      description: Actions to execute when device sends "arrow_right_hold" event
      default: []
      selector:
        action:

    event_brightness_move_up:
      name: Event "brightness_move_up" Actions
      description: Actions to execute when device sends "brightness_move_up" event
      default: []
      selector:
        action:

    event_brightness_move_down:
      name: Event "brightness_move_down" Actions
      description: Actions to execute when device sends "brightness_move_down" event
      default: []
      selector:
        action:

    event_brightness_stop:
      name: Event "brightness_stop" Actions
      description: Actions to execute when device sends "brightness_stop" event
      default: []
      selector:
        action:

    event_double_click:
      name: Event "double_click" Actions
      description: Actions to execute when device sends "double_click" event
      default: []
      selector:
        action:

    event_long_press:
      name: Event "long_press" Actions
      description: Actions to execute when device sends "long_press" event
      default: []
      selector:
        action:

    event_rotate_left:
      name: Event "rotate_left" Actions
      description: Actions to execute when device sends "rotate_left" event (rotary dimmers)
      default: []
      selector:
        action:

    event_rotate_right:
      name: Event "rotate_right" Actions
      description: Actions to execute when device sends "rotate_right" event (rotary dimmers)
      default: []
      selector:
        action:

mode: queued
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input event_entity
    attribute: event_type

condition:
  - condition: template
    value_template: >
      {{ trigger.to_state.attributes.event_type is defined
         and trigger.to_state.attributes.event_type not in ['', none, null] }}

action:
  - alias: Map Zigbee2MQTT event to actions
    choose:
      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'on' }}"
        sequence: !input event_on

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'off' }}"
        sequence: !input event_off

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'toggle' }}"
        sequence: !input event_toggle

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'arrow_left_click' }}"
        sequence: !input event_arrow_left_click

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'arrow_right_click' }}"
        sequence: !input event_arrow_right_click

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'arrow_left_hold' }}"
        sequence: !input event_arrow_left_hold

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'arrow_right_hold' }}"
        sequence: !input event_arrow_right_hold

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'brightness_move_up' }}"
        sequence: !input event_brightness_move_up

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'brightness_move_down' }}"
        sequence: !input event_brightness_move_down

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'brightness_stop' }}"
        sequence: !input event_brightness_stop

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'double_click' }}"
        sequence: !input event_double_click

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'long_press' }}"
        sequence: !input event_long_press

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'rotate_left' }}"
        sequence: !input event_rotate_left

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'rotate_right' }}"
        sequence: !input event_rotate_right

    default:
      - alias: Log unknown event for debugging
        action: system_log.write
        data:
          message: >
            Zigbee2MQTT Event Mapper: Unknown event '{{ trigger.to_state.attributes.event_type }}'
            from entity '{{ trigger.entity_id }}'.
            Add this event to the blueprint if you want to handle it.
          level: warning
