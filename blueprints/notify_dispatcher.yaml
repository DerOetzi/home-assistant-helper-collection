blueprint:
  name: Notify Dispatcher
  description: >
    Routes notifications to persons based on notification type and current presence.

    Instead of always broadcasting to everyone, the dispatcher checks who is home
    and routes accordingly. Each person is identified by a binary sensor (on = home)
    and a corresponding notify service. Sensors and services are matched by index
    position – sensor[0] belongs to service[0], sensor[1] to service[1], etc.

    NOTIFICATION TYPES:

    alert – Always broadcasts to all persons regardless of presence.

    reminderAll – Always broadcasts to all persons regardless of presence.

    reminderHomeOrAll – Sends only to persons currently home. Falls back to
    broadcast if nobody is home.

    reminderHomeOrFirstAll – Broadcasts on the first occurrence (reminder_count < 1),
    then sends only to home persons on subsequent reminders. Falls back to broadcast
    if nobody is home.

    FIELDS (passed on each script call):
    - notify_type: one of the four types above
    - title: notification title
    - message: notification body (required)
    - reminder_count: how many times this reminder has already been sent (default 0)
    - extra_data: additional notify payload (actions, tag, critical, etc.)
  domain: script
  author: deroetzi
  homeassistant:
    min_version: 2024.6.0
  input:
    presence_sensors:
      name: Presence Sensors
      description: >
        One binary sensor per person – on means the person is home. The order must
        match the order of the notify services below.
      selector:
        entity:
          multiple: true
          filter:
            domain: binary_sensor
          reorder: false
    notify_services:
      name: Notify Services
      description: >
        One notify service per person (e.g. notify.mobile_app_alice). The order must
        match the order of the presence sensors above.
      selector:
        text:
          multiple: true

fields:
  notify_type:
    description: "alert | reminderAll | reminderHomeOrAll | reminderHomeOrFirstAll"
    required: true
    selector:
      select:
        options:
          - alert
          - reminderAll
          - reminderHomeOrAll
          - reminderHomeOrFirstAll
  title:
    description: "Notification title"
    default: ""
    selector:
      text:
  message:
    description: "Notification body text"
    required: true
    selector:
      text:
  reminder_count:
    description: "How many times this reminder has already been sent"
    default: 0
    selector:
      number:
        min: 0
        mode: box
  extra_data:
    description: "Additional notify payload (actions, tag, critical, etc.)"
    default: {}

mode: parallel

sequence:
  - variables:
      sensor_list: !input presence_sensors
      service_list: !input notify_services

  - condition: template
    value_template: "{{ sensor_list | length == service_list | length }}"

  - variables:
      persons: >
        {% set ns = namespace(list=[]) %}
        {% for i in range(sensor_list | length) %}
          {% set ns.list = ns.list + [{
            'presence_sensor': sensor_list[i],
            'service': service_list[i]
          }] %}
        {% endfor %}
        {{ ns.list }}

      home_persons: >
        {% set ns = namespace(list=[]) %}
        {% for p in persons %}
          {% if is_state(p.presence_sensor, 'on') %}
            {% set ns.list = ns.list + [p] %}
          {% endif %}
        {% endfor %}
        {{ ns.list }}

      do_broadcast: >
        {% if notify_type in ['alert', 'reminderAll'] %}
          true
        {% elif notify_type == 'reminderHomeOrAll' %}
          {{ home_persons | length == 0 }}
        {% elif notify_type == 'reminderHomeOrFirstAll' %}
          {{ (reminder_count | int) < 1 or home_persons | length == 0 }}
        {% else %}
          true
        {% endif %}

      targets: "{{ persons if do_broadcast | bool else home_persons }}"

  - repeat:
      for_each: "{{ targets }}"
      sequence:
        - action: "{{ repeat.item.service }}"
          data:
            title: "{{ title }}"
            message: "{{ message }}"
            data: "{{ extra_data }}"
