name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yaml-lint:
    name: YAML syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Validate blueprint/script/template YAML files
        run: |
          python - <<'EOF'
          import pathlib
          import sys
          import yaml

          class HALoader(yaml.SafeLoader):
              pass

          HALoader.add_constructor(
              "!input", lambda loader, node: loader.construct_scalar(node)
          )
          HALoader.add_constructor(
              "!secret", lambda loader, node: loader.construct_scalar(node)
          )

          failed = False
          for pattern in ("blueprints/**/*.yaml", "script/**/*.yaml", "templates/**/*.yaml"):
              for path in pathlib.Path(".").glob(pattern):
                  try:
                      yaml.load(path.read_text(), Loader=HALoader)
                  except yaml.YAMLError as exc:
                      failed = True
                      print(f"::error file={path}::{exc}")

          sys.exit(1 if failed else 0)
          EOF
